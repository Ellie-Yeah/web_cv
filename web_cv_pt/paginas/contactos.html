<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>EFF WebCV - Contactos</title>
    <link rel="stylesheet" href="../../estilos/contactos_estilos.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Varta:wght@300..700&display=swap">
    <style>
        body {
            font-family: "Varta", sans-serif;
        }
    </style>
</head>

<body>


    <!-- Light animation inspired by https://codepen.io/aaroniker/pen/KKVZzjP -->
    <div class='light x1'></div>
    <div class='light x2'></div>
    <div class='light x3'></div>
    <div class='light x4'></div>
    <div class='light x5'></div>
    <div class='light x6'></div>
    <div class='light x7'></div>
    <div class='light x8'></div>
    <div class='light x9'></div>

    <!-- Dropdown inspired by https://www.w3schools.com/howto/howto_js_dropdown.asp -->
    <header>
        <div class="dropdown">
            <button class="menu_button" onclick="toggleDropdown()">Menu</button>
            <div id="dropdown-content" class="dropdown-content">
                <a href="apresentacao.html">Apresentação</a>
                <a href="competencias.html">Competências</a>
                <a href="experiencia.html">Experiência</a>
                <a href="formacao.html">Formação</a>
                <a href="cronologia.html">Cronologia</a>

            </div>
        </div>
    </header>

    <!-- blur quando o dropdown está aberto -->
    <div id="backdrop" class="backdrop" onclick="toggleDropdown()"></div>



    <h2>Contactos</h2>

    <div class="formulario">
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="c31581a1-d037-41c3-805d-fb67b6fb1947">
            <label for="name">Nome:</label><br>
            <input type="text" id="name" name="name" required />
            <br>

            <label for="email">Email:</label>
            <br>
            <input type="email" id="email" name="email" required />
            <br>

            <label for="subject">Assunto:</label>
            <br>
            <input type="text" id="subject" name="subject" />
            <br>

            <label for="message">Mensagem:</label>
            <br>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Enviar</button>
        </form>

    </div>


    <footer>
        <p>© 2026 Elisabete Farinha. All rights reserved.</p>
    </footer>

    <!-- script em JS para fazer o dropdown funcionar, e quando activado, todo o conteudo da pagina fica desfocado, dando o destaque as opcoes do dropdown  -->
    <script>
        function toggleDropdown() {
            var dropdown = document.getElementById("dropdown-content");
            var backdrop = document.getElementById("backdrop");
            if (dropdown.style.display === "block") {
                dropdown.style.display = "none";
                backdrop.style.display = "none";
            } else {
                dropdown.style.display = "block";
                backdrop.style.display = "block";
            }
        }
    </script>
</body>

</html>
